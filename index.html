<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="✨ Shiny Raid Seed Searcher">
    <meta property="og:description" content="Filter and search for shiny Paldea raid seeds by species, tera type, and star level for Pokémon Scarlet. Copy raid commands for the #shiny-raids channel in Oceanside Pokémon.">
    <meta property="og:image" content="https://pkmfans.github.io/RaidSeedFinder/thumbnail.png">
    <meta property="og:url" content="https://pkmfans.github.io/RaidSeedFinder/">
    <meta property="og:type" content="website">
    <title>✨ Shiny Raid Seeds ✨</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1c1c1c;
            background-image: url('https://i.imgur.com/TvJLpIr.png');
            background-size: contain;
            background-repeat: repeat;
            background-position: top left;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        /* Discord bar */
        #discord-bar {
            display: block;
            background-color: #5865F2;
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 1rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        #discord-bar:hover {
            background-color: #4752c4;
            text-decoration: underline;
        }

        /* Header */
        #header-image {
            display: block;
            margin: 28px auto 10px;
            max-width: 90%;
            max-height: 120px;
            height: auto;
        }

        h1 {
            text-align: center;
            color: #f9f9f9;
            font-size: 2rem;
            margin: 8px 0 4px;
        }

        .small-text {
            text-align: center;
            color: #aaa;
            font-size: 0.88rem;
            margin: 0 0 20px;
        }

        /* Form */
        form {
            background-color: #2a2a2a;
            padding: 20px 24px;
            border-radius: 10px;
            width: 100%;
            max-width: 560px;
            margin: 0 auto 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-field.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input, select {
            background-color: #3a3a3a;
            color: #f0f0f0;
            border: 1px solid #505050;
            border-radius: 6px;
            font-size: 0.95rem;
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #5865F2;
            background-color: #404040;
        }

        input::placeholder {
            color: #666;
        }

        .search-btn {
            display: block;
            width: 100%;
            padding: 11px;
            background-color: #5865F2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            letter-spacing: 0.03em;
        }

        .search-btn:hover {
            background-color: #4752c4;
        }

        .search-btn:active {
            background-color: #3c45a5;
        }

        .search-btn:disabled {
            background-color: #3a3a3a;
            color: #666;
            cursor: not-allowed;
        }

        /* Loading */
        #loading {
            display: none;
            text-align: center;
            color: #888;
            font-size: 0.95rem;
            margin: 12px 0;
        }

        /* Results count */
        #results-header {
            text-align: center;
            color: #888;
            font-size: 0.88rem;
            margin: 0 0 16px;
            display: none;
        }

        /* Results grid */
        #results {
            list-style: none;
            padding: 0 16px 48px;
            margin: 0 auto;
            max-width: 1280px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        /* Seed card */
        .seed {
            background-color: #252525;
            border: 1px solid #383838;
            border-radius: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
        }

        .seed:hover {
            border-color: #5865F2;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background-color: #2e2e2e;
            border-bottom: 1px solid #383838;
        }

        .card-sprite {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .card-title {
            flex: 1;
            min-width: 0;
        }

        .species-name {
            font-size: 1rem;
            font-weight: 700;
            color: #f0f0f0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .star-row {
            font-size: 0.78rem;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }

        .tera-badge {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            margin-top: 5px;
            background-color: #5865F2;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: 12px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 8px;
        }

        .field-label:first-child {
            margin-top: 0;
        }

        .seed-value {
            font-size: 0.82rem;
            color: #ccc;
            font-family: 'Consolas', 'Courier New', monospace;
            word-break: break-all;
            margin-top: 2px;
        }

        .rewards-list {
            list-style: none;
            padding: 0;
            margin: 3px 0 0;
        }

        .rewards-list li {
            font-size: 0.82rem;
            color: #bbb;
            line-height: 1.6;
        }

        /* Card footer / copy button */
        .card-footer {
            padding: 10px 14px;
            border-top: 1px solid #383838;
        }

        .copy-button {
            display: block;
            width: 100%;
            padding: 8px;
            background-color: #333;
            color: #ddd;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
            text-align: center;
        }

        .copy-button:hover {
            background-color: #3a7a3a;
            border-color: #4CAF50;
            color: white;
        }

        .copy-button.copied {
            background-color: #3a7a3a;
            border-color: #4CAF50;
            color: white;
        }

        /* Empty / error states */
        .state-message {
            text-align: center;
            color: #777;
            font-size: 0.95rem;
            padding: 40px 0;
            width: 100%;
        }

        @media (max-width: 520px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-field.full-width {
                grid-column: auto;
            }

            .seed {
                width: calc(100vw - 32px);
                max-width: 340px;
            }
        }
    </style>
</head>
<body>
    <a id="discord-bar" href="https://discord.gg/plza" target="_blank">Join the Oceanside Pokémon Discord!</a>

    <img id="header-image" src="https://i.imgur.com/EZbXKmd.png" alt="Shiny Raid Seeds Banner">
    <h1>✨ Shiny Raid Seeds ✨</h1>
    <div class="small-text">Made for Oceanside Pokémon</div>

    <form id="filterForm">
        <div class="form-grid">
            <div class="form-field full-width">
                <label for="species">Species</label>
                <input type="text" id="species" name="species" placeholder="e.g. Vulpix, Gardevoir…">
            </div>
            <div class="form-field">
                <label for="tera_type">Tera Type</label>
                <select id="tera_type" name="tera_type">
                    <option value="">Any</option>
                    <option value="Normal">Normal</option>
                    <option value="Fire">Fire</option>
                    <option value="Water">Water</option>
                    <option value="Electric">Electric</option>
                    <option value="Grass">Grass</option>
                    <option value="Ice">Ice</option>
                    <option value="Fighting">Fighting</option>
                    <option value="Poison">Poison</option>
                    <option value="Ground">Ground</option>
                    <option value="Flying">Flying</option>
                    <option value="Psychic">Psychic</option>
                    <option value="Bug">Bug</option>
                    <option value="Rock">Rock</option>
                    <option value="Ghost">Ghost</option>
                    <option value="Dragon">Dragon</option>
                    <option value="Dark">Dark</option>
                    <option value="Steel">Steel</option>
                    <option value="Fairy">Fairy</option>
                    <option value="Stellar">Stellar</option>
                </select>
            </div>
            <div class="form-field">
                <label for="star_level">Star Level</label>
                <select id="star_level" name="star_level">
                    <option value="">Any</option>
                    <option value="1">1 Star</option>
                    <option value="2">2 Star</option>
                    <option value="3">3 Star</option>
                    <option value="4">4 Star</option>
                    <option value="5">5 Star</option>
                    <option value="6">6 Star</option>
                </select>
            </div>
        </div>
        <button type="submit" class="search-btn">Search</button>
    </form>

    <div id="loading">Loading seeds…</div>
    <p id="results-header"></p>
    <ul id="results"></ul>

    <script>
        const PALDEA_FILES = [
            { file: 'paldea6iv6star4herba.json', starLevel: 6 },
            { file: 'paldea6iv5star.json',       starLevel: 5 },
            { file: 'paldea4star.json',           starLevel: 4 },
            { file: 'paldea3star.json',           starLevel: 3 },
            { file: 'paldea2star.json',           starLevel: 2 },
            { file: 'paldea1star.json',           starLevel: 1 },
        ];

        const getPokemonSprite = (species) => {
            const formatted = species.toLowerCase().replace(/[^a-z0-9]/g, '');
            return `https://img.pokemondb.net/sprites/home/shiny/${formatted}.png`;
        };

        document.getElementById('filterForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const species   = document.getElementById('species').value.toLowerCase().trim();
            const teraType  = document.getElementById('tera_type').value.toLowerCase();
            const starLevel = document.getElementById('star_level').value;

            const submitBtn      = this.querySelector('.search-btn');
            const loading        = document.getElementById('loading');
            const resultsHeader  = document.getElementById('results-header');
            const resultsContainer = document.getElementById('results');

            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultsContainer.innerHTML = '';
            resultsHeader.style.display = 'none';

            Promise.all(PALDEA_FILES.map(({ file }) => fetch(file).then(r => r.json())))
                .then(dataArray => {
                    const allSeeds = dataArray.flatMap((data, i) =>
                        data.seeds.map(seed => ({ ...seed, starLevel: PALDEA_FILES[i].starLevel }))
                    );

                    const filtered = allSeeds.filter(seed =>
                        (species   === '' || seed.species.toLowerCase().includes(species)) &&
                        (teraType  === '' || seed.tera_type.toLowerCase().includes(teraType)) &&
                        (starLevel === '' || seed.starLevel == starLevel)
                    );

                    displayResults(filtered);
                })
                .catch(err => {
                    console.error('Error fetching seed data:', err);
                    resultsContainer.innerHTML = '<li class="state-message">Failed to load seed data. Please try again.</li>';
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    loading.style.display = 'none';
                });
        });

        function displayResults(seeds) {
            const resultsHeader    = document.getElementById('results-header');
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            if (seeds.length === 0) {
                resultsHeader.style.display = 'none';
                resultsContainer.innerHTML = '<li class="state-message">No matching seeds found.</li>';
                return;
            }

            resultsHeader.textContent = `${seeds.length.toLocaleString()} result${seeds.length !== 1 ? 's' : ''} found`;
            resultsHeader.style.display = 'block';

            seeds.forEach(seed => {
                const rewardsMap = new Map();
                seed.rewards.forEach(r => {
                    rewardsMap.set(r.name, (rewardsMap.get(r.name) || 0) + r.count);
                });
                const mergedRewards = Array.from(rewardsMap, ([name, count]) => ({ name, count }));

                const endNumber    = seed.starLevel <= 2 ? 3 : 6;
                const adjustedStar = seed.starLevel <= 2 ? 3 : seed.starLevel;
                const command      = `<@1159331519173763144> ra ${seed.seed} ${adjustedStar} ${endNumber}`;

                const li = document.createElement('li');
                li.className = 'seed';
                li.innerHTML = `
                    <div class="card-header">
                        <img class="card-sprite" src="${getPokemonSprite(seed.species)}" alt="${seed.species}" onerror="this.style.display='none'">
                        <div class="card-title">
                            <div class="species-name">${seed.species}</div>
                            <div class="star-row">${'⭐'.repeat(seed.starLevel)}</div>
                            <span class="tera-badge">${seed.tera_type}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="field-label">Seed</div>
                        <div class="seed-value">${seed.seed}</div>
                        <div class="field-label">Item Drops</div>
                        <ul class="rewards-list">
                            ${mergedRewards.map(r => `<li>${r.count}× ${r.name}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="copy-button" data-command="${command}">Copy Command</button>
                    </div>
                `;

                resultsContainer.appendChild(li);
            });

            resultsContainer.querySelectorAll('.copy-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(btn.dataset.command).then(() => {
                        btn.textContent = 'Copied! ✓';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = 'Copy Command';
                            btn.classList.remove('copied');
                        }, 1500);
                    });
                });
            });
        }
    </script>
</body>
</html>
